<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Purple Skull Poof — Deathrattle FX preview</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #17131f; color: #e8e2f2; font: 13px/1.4 ui-monospace, "SF Mono", Menlo, monospace; display: flex; height: 100vh; overflow: hidden; }
  #stage { flex: 1; position: relative; display: grid; place-items: center; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  /* a fake "card" so the skull is sized against something the size of a real unit */
  #card { width: 132px; height: 184px; border-radius: 10px; background: linear-gradient(160deg,#2b2438,#1d1828); border: 2px solid #3d3350; box-shadow: 0 8px 30px rgba(0,0,0,.5); position: relative; z-index: 0; }
  #card::after { content: "unit"; position: absolute; inset: auto 0 8px; text-align: center; color: #5c5170; font-size: 11px; letter-spacing: .12em; }
  #panel { width: 300px; padding: 14px 16px; overflow-y: auto; background: #100d16; border-left: 1px solid #2c2438; }
  h1 { font-size: 13px; margin: 0 0 4px; letter-spacing: .08em; text-transform: uppercase; color: #cba6f0; }
  .sub { color: #6f6485; font-size: 11px; margin-bottom: 14px; }
  h2 { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #6f6485; margin: 16px 0 6px; border-top: 1px solid #2c2438; padding-top: 10px; }
  .row { display: grid; grid-template-columns: 1fr 54px; gap: 8px; align-items: center; margin-bottom: 7px; }
  label { color: #b3a8c6; font-size: 11.5px; }
  input[type=range] { width: 100%; accent-color: #cba6f0; }
  input[type=color] { width: 100%; height: 24px; border: 1px solid #3d3350; background: none; border-radius: 4px; padding: 0; cursor: pointer; }
  .val { text-align: right; color: #cba6f0; font-size: 11px; }
  button { width: 100%; padding: 9px; margin-top: 12px; border: 0; border-radius: 6px; background: #7a4fbf; color: #fff; font: inherit; font-weight: 700; letter-spacing: .06em; cursor: pointer; }
  button:hover { background: #9265d8; }
  button.ghost { background: #241d31; color: #b3a8c6; }
  button.ghost:hover { background: #2f2740; }
  textarea { width: 100%; height: 130px; margin-top: 10px; background: #0a0810; color: #9fe6c4; border: 1px solid #2c2438; border-radius: 6px; padding: 8px; font: 10.5px/1.45 ui-monospace, monospace; resize: vertical; }
  .hint { color: #55496b; font-size: 10.5px; margin-top: 8px; }
</style>
</head>
<body>
  <div id="stage"><div id="card"></div><canvas id="cv"></canvas></div>
  <div id="panel">
    <h1>Purple Skull Poof</h1>
    <div class="sub">Deathrattle FX — pop, hold, poof into smoke.<br />Click the stage to re-fire.</div>
    <div id="controls"></div>
    <button id="fire">FIRE ☠ (space)</button>
    <button id="loop" class="ghost">Auto-loop: off</button>
    <button id="reset" class="ghost">Reset to defaults</button>
    <h2>Baked values</h2>
    <textarea id="out" readonly></textarea>
    <div class="hint">Tune, then paste this back to Claude to bake into pixiFx.ts.</div>
    <div class="hint" id="diag">booting…</div>
    <div class="hint" id="glyphcheck"></div>
  </div>

<script>
// ---------------------------------------------------------------------------
// Standalone preview of the proposed Deathrattle FX. Mirrors the math that will
// live in pixiFx.ts (spawn/particle tick), but on a plain 2D canvas so it runs
// with zero build. Numbers here map 1:1 onto the DR_* constants in the spec.
// ---------------------------------------------------------------------------

const CARD_W = 132; // matches the fake card above; the real call passes the unit's card width

const DEFAULTS = {
  shape: 'svg',        // 'svg' = the vendored silhouette · 'glyph' = a Unicode character
  glyph: '☠',          // used when shape === 'glyph'
  skullScale: 0.435,   // DR_SKULL_SCALE — skull display width ÷ card width
  popMs:      320,     // elastic pop-in duration
  holdMs:     130,     // jiggle hold before the burst
  rise:       12,      // px the skull drifts up during the pop
  glowAlpha:  0.12,    // additive glow sprite behind the skull
  glowSize:   1.7,     // glow radius ÷ skull width

  dissolveMs:   220,   // the skull's own scale-up + fade (the "poof")
  dissolveGrow: 3,     // how much it scales up as it fades

  flashMs:   220,
  flashSize: 4,

  spread:  3,          // DR_SPREAD — velocity multiplier for smoke + embers
  smoke:   2.25,       // DR_SMOKE — particle count multiplier (base 28)
  smokeOut: 1,         // 0 = rises like a campfire, 1 = blasts outward
  smokeLife: 400,
  embers:  3,          // DR_EMBERS — count multiplier (base 14)
  emberLife: 320,

  cFill:  '#cfa9fe',   // the skull fill
  cGlow:  '#b478f0',   // baked text-shadow + the flash
  cSmokeA:'#4a3a5e',
  cSmokeB:'#6b5580',
  cEmberA:'#cba6f0',
  cEmberB:'#e0c4ff',
};
const RANGES = {
  skullScale: [0.15, 0.8, 0.005], popMs: [120, 800, 10], holdMs: [0, 500, 10], rise: [0, 40, 1],
  glowAlpha: [0, 1, 0.02], glowSize: [1, 4, 0.05],
  dissolveMs: [60, 600, 10], dissolveGrow: [1, 3, 0.05],
  flashMs: [0, 500, 10], flashSize: [0, 4, 0.05],
  spread: [0.2, 4, 0.05], smoke: [0, 2.5, 0.05], smokeOut: [0, 1, 0.02], smokeLife: [300, 2200, 20],
  embers: [0, 3, 0.05], emberLife: [150, 1500, 10],
};
const GROUPS = [
  ['Shape',       ['shape','glyph']],
  ['Skull pop',   ['skullScale','popMs','holdMs','rise','glowAlpha','glowSize']],
  ['The poof',    ['dissolveMs','dissolveGrow','flashMs','flashSize']],
  ['Smoke',       ['smoke','smokeOut','smokeLife']],
  ['Embers',      ['embers','emberLife','spread']],
  ['Colours',     ['cFill','cGlow','cSmokeA','cSmokeB','cEmberA','cEmberB']],
];

// Any uncaught error would otherwise leave a silent blank page — surface it loudly instead.
addEventListener('error', (e) => {
  const b = document.createElement('div');
  b.style.cssText = 'position:fixed;inset:0 auto auto 0;z-index:99;background:#b0203a;color:#fff;padding:10px 14px;font:12px ui-monospace,monospace;white-space:pre-wrap;max-width:100%';
  b.textContent = 'SCRIPT ERROR: ' + (e.message || e.error) + '\n' + (e.filename || '') + ':' + (e.lineno || '?');
  document.body.appendChild(b);
});

const KEY = 'ascent.purpleSkullPreview';
// localStorage throws on some file:// origins — never let persistence kill the preview.
const store = {
  get() { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; } },
  set(v) { try { localStorage.setItem(KEY, JSON.stringify(v)); } catch { /* no persistence, fine */ } },
};
let C = { ...DEFAULTS, ...store.get() };

const diag = document.getElementById('diag');
const FONT_STACK = '"Segoe UI Symbol", "Segoe UI Emoji", "Apple Symbols", "Noto Sans Symbols 2", "DejaVu Sans", sans-serif';

/** The vendored silhouette (apps/web/public/fx/skull-crossbones.svg) — two filled paths, one colour, no
 *  strokes, so it takes the same purple fill + baked glow as a glyph would. */
const SKULL_SVG = {
  w: 864, h: 1048,
  paths: [
    'M415.161 0.62099C465.652 -2.94079 532.087 9.12835 578.218 28.8911C698.628 80.4778 759.338 192.8 736.431 321.604C733.664 337.186 730.033 349.137 725.263 364.297C720.371 379.838 712.209 391.802 712.735 408.145C713.427 429.633 725.838 441.299 733.688 459.485C739.37 472.661 738.342 488.19 732.519 501.252C721.246 526.532 699.852 541.821 672.623 545.905C656.758 548.286 638.456 548.825 623.675 554.722C598.246 564.868 599.575 581.026 599.667 603.296L599.808 635.822C599.875 653.995 598.038 670.68 577.618 677.838C568.403 681.065 550.058 685.363 541.033 681.028C525.621 673.631 535.951 645.006 531.487 632.974C530.342 629.937 528.003 627.5 525.021 626.227C520.827 624.384 514.832 624.653 511.495 627.794C498.729 639.808 517.6 685.228 494.222 689.882C422.882 704.1 453.706 660.448 443.891 632.074C440.664 627.66 436.09 623.973 430.475 624.972C407.082 629.147 428.136 672.627 413.615 686.147C408.829 690.598 404.375 692 397.967 692.154C387.133 691.664 371.222 693.795 363.182 685.884C353.245 674.819 358.345 654.754 357.494 640.757C356.963 632.038 352.828 623.514 342.905 625.137C321.314 628.682 339.202 665.31 327.619 677.648C324.314 681.175 320.062 682.889 315.157 682.951C301.969 682.087 285.378 680.152 275.181 670.968C262.754 659.775 264.843 645.453 264.541 630.672C264.245 616.185 265.27 600.345 264.471 585.955C262.201 545.06 209.934 551.079 181.813 543.792C157.883 537.822 138.484 520.532 130.048 497.349C122.631 476.964 128 460.433 139.287 443.042C147.171 430.894 153.014 415.265 151.069 400.763C149.52 389.22 143.166 376.676 139.305 365.358C108.474 274.988 120.64 170.599 186.707 98.673C245.172 33.9628 328.774 5.05836 415.161 0.62099ZM301.744 455.699C354.876 440.193 396.86 401.535 379.763 341.433C375.37 325.991 365.064 313.638 350.968 306.432C335.181 297.954 300.554 293.502 282.796 295.735C273.3 296.735 265.839 297.749 256.56 300.242C214.222 311.617 201.905 352.145 206.665 391.693C213.922 451.989 244.332 469.738 301.744 455.699ZM582.48 459.516C600.389 461.127 618.881 460.768 633.08 448.395C650.801 432.953 656.17 408.05 658.111 386.38C662.936 332.62 634.005 297.15 579.51 295.686C573.173 295.516 566.339 295.102 559.794 295.748C537.494 297.585 511.446 301.282 496.163 319.522C483.494 334.645 479.582 355.218 481.082 374.493C485.007 425.101 536.771 453.825 582.48 459.516ZM433.23 531.809L433.867 532.336C441.454 538.71 448.63 549.413 459.615 547.925C477.733 545.47 476.465 516.34 473.912 503.517C469.895 483.383 460.882 459.888 444.754 446.488C440.756 443.398 436.457 442.102 431.498 441.983C424.817 443.069 419.772 445.119 415.047 450.333C396.741 470.548 386.177 502.836 389.687 529.868C391.084 540.62 398.249 549.327 409.362 547.723C419.374 546.762 425.717 532.207 433.23 531.809Z',
    'M89.4462 570.013C98.2128 568.537 110.914 571.648 118.832 575.102C135.433 582.162 147.388 596.265 150.956 613.001C152.652 620.613 152.807 627.208 155.704 634.691C164.38 657.098 187.177 664.9 208.42 674.012L257.807 695.01L432.273 768.69C488.209 744.404 544.903 721.189 601.114 697.404L651.919 675.653C662.585 671.06 674.331 666.314 684.389 660.956C695.696 654.936 706.572 642.511 709.654 630.558C712.526 619.443 712.081 610.197 718.115 599.492C725.705 586.045 736.66 577.251 752.279 572.505C766.63 568.029 782.308 569.198 795.723 575.745C824.214 589.37 836.3 621.752 821.296 648.464C838.957 653.767 853.314 664.734 860.132 681.293C871.761 709.529 856.187 741.22 825.758 751.44C809.19 757.006 790.593 755.102 775.307 747.025C769.646 744.036 764.568 739.223 758.45 736.847C749.223 733.259 736.758 732.42 727.027 734.986C710.367 739.37 693.275 747.851 677.413 754.465L588.988 792.052C572.616 799.07 553.881 807.558 537.319 813.73C579.663 831.036 622.138 848.078 664.731 864.839L698.431 878.133C704.811 880.644 713.953 884.698 720.457 886.229C753.601 894.049 755.316 872.659 777.931 861.471C791.914 854.533 808.28 853.118 823.376 857.552C838.388 862.193 850.808 872.236 857.894 885.463C867.599 903.32 865.596 926.688 852.875 942.787C845.599 951.991 838.1 956.946 827.309 961.961C832.04 969.762 835.168 976.137 836.503 985.115C838.787 999.793 834.547 1014.71 824.764 1026.39C814.516 1038.76 800.853 1045.24 784.474 1047.23C774.057 1048.48 762.573 1046.77 752.986 1042.82C739.205 1037.2 728.428 1026.62 723.068 1013.48C717.604 999.86 716.682 988.44 702.286 979.162C693.085 973.241 683.178 969.162 673.218 964.514C656.388 956.652 639.473 948.936 622.485 941.379C559.339 913.467 495.924 886.113 432.234 859.309C421.79 863.241 408.053 869.523 397.607 873.945L324.821 905.096C283.931 922.5 243.29 940.412 202.91 958.832C190.068 964.753 169.394 973.228 158.71 981.361C145.38 991.502 145.144 1006.21 138.292 1019.18C131.707 1031.65 118.406 1041.1 104.111 1045.19C88.4699 1049.6 71.6003 1048.01 57.2159 1040.76C43.698 1033.77 33.6645 1022.08 29.2874 1008.21C23.7567 990.516 28.001 977.288 36.9128 961.906C4.87425 947.98 -9.08868 915.984 6.22421 885.684C12.9282 872.714 24.8646 862.757 39.4079 858.017C59.7045 851.446 82.2161 855.812 98.0472 869.395C104.483 874.967 109.092 881.575 117.25 885.004C128.293 889.695 139.06 888.28 149.863 884.116C161.74 879.542 173.602 874.961 185.46 870.368C215.641 858.605 245.738 846.658 275.752 834.52C291.977 827.943 310.896 819.689 327.072 813.798C303.43 804.777 275.034 791.807 251.548 781.734L181.081 751.918C156.334 741.507 124.998 723.724 99.0399 740.356C92.256 744.704 86.8202 748.586 78.9586 751.262C64.2229 756.382 47.9173 755.812 33.6318 749.676C19.572 743.559 8.71016 732.432 3.46409 718.776C-1.75451 704.741 -0.683303 689.327 6.43427 676.045C14.1434 661.452 26.6739 653.663 42.6294 648.537C25.0903 612.162 46.9966 574.942 89.4462 570.013Z',
  ],
};
const SVG_PATHS = SKULL_SVG.paths.map((d) => new Path2D(d));

// --- the skull texture: glyph OR svg silhouette, with a baked text-shadow stack ---
// Non-square art is allowed: skullW/skullH carry the aspect, and every draw uses both.
let skullTex = null, skullW = 0, skullH = 0;
function buildSkullTex() {
  const box = 256; // the art's long edge, before glow padding
  const svg = C.shape === 'svg';
  const aspect = svg ? SKULL_SVG.w / SKULL_SVG.h : 1;
  const cw = svg && aspect < 1 ? box * aspect : box;
  const ch = svg && aspect < 1 ? box : box / (svg ? aspect : 1);
  const pad = Math.round(box * 0.42); // room for the glow to fall off inside the texture
  const c = document.createElement('canvas');
  c.width = Math.round(cw + pad * 2); c.height = Math.round(ch + pad * 2);
  const g = c.getContext('2d');
  g.fillStyle = C.cFill;

  // the shape, drawn centred, as a reusable closure so each shadow pass repeats it
  const draw = svg
    ? () => {
        g.save();
        g.translate(pad, pad);
        g.scale(cw / SKULL_SVG.w, ch / SKULL_SVG.h);
        for (const p of SVG_PATHS) g.fill(p);
        g.restore();
      }
    : () => {
        g.font = `${box}px ${FONT_STACK}`;
        g.textAlign = 'center'; g.textBaseline = 'middle';
        g.fillText(C.glyph, c.width / 2, c.height / 2);
      };

  // three shadowed passes ≈ the CSS text-shadow stack on .float.rally.sym, then a crisp core
  const passes = [[C.cGlow, box * 0.31, 0.95], [C.cGlow, box * 0.17, 0.9], [C.cFill, box * 0.06, 1]];
  for (const [col, blur, a] of passes) {
    g.globalAlpha = a; g.shadowColor = col; g.shadowBlur = blur;
    draw();
  }
  g.globalAlpha = 1; g.shadowBlur = 0;
  draw();
  skullTex = c; skullW = c.width; skullH = c.height;
}

// --- radial glow sprite (stands in for pixiFx's glowTex) ---------------------
const glowTex = (() => {
  const s = 128, c = document.createElement('canvas'); c.width = c.height = s;
  const g = c.getContext('2d');
  const grd = g.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  grd.addColorStop(0, 'rgba(255,255,255,1)');
  grd.addColorStop(0.35, 'rgba(255,255,255,0.55)');
  grd.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grd; g.fillRect(0, 0, s, s);
  return c;
})();

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
function resize() {
  const r = cv.getBoundingClientRect(), dpr = devicePixelRatio || 1;
  cv.width = r.width * dpr; cv.height = r.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener('resize', resize);

const parts = [];  // fire-and-forget particles
const pops = [];   // live skull pops
const rnd = () => Math.random();
const hex = (h) => { const n = parseInt(h.slice(1), 16); return [n >> 16 & 255, n >> 8 & 255, n & 255]; };

function spawn(p) { parts.push({ age: 0, spin: 0, rot: 0, drag: 0.9, blend: 'lighter', ...p }); }

function fire(x, y) {
  const scale = (CARD_W * C.skullScale) / skullW;
  pops.push({ x, y, scale, age: 0 });
}

function burst(s) {
  const { x, y, scale } = s, disp = scale * skullW;
  // 1) the skull itself dissolves — scales up + fades (THE poof)
  spawn({ tex: skullTex, x, y, vx: 0, vy: -14, drag: 0.86, life: C.dissolveMs,
          from: scale, to: scale * C.dissolveGrow, peak: 1, blend: 'source-over', tint: null });
  // 2) flash
  if (C.flashMs > 0) spawn({ tex: glowTex, x, y, vx: 0, vy: 0, drag: 1, life: C.flashMs,
          from: disp * 0.006 * C.flashSize, to: disp * 0.016 * C.flashSize, peak: 0.75, tint: C.cGlow });
  // 3) purple smoke plume — biased outward by smokeOut
  const nsm = Math.round(28 * C.smoke);
  for (let i = 0; i < nsm; i++) {
    const a = rnd() * 6.28, sp = (55 + rnd() * 95) * C.spread;
    const out = C.smokeOut;
    spawn({ tex: glowTex, blend: 'source-over',
      x: x + (rnd() - 0.5) * disp * 0.5, y: y + (rnd() - 0.5) * disp * 0.4,
      vx: Math.cos(a) * sp * out, vy: Math.sin(a) * sp * out - (1 - out) * (45 + rnd() * 85),
      drag: 0.6, life: C.smokeLife * (0.75 + rnd() * 0.5),
      from: disp * 0.004 * (0.7 + rnd() * 0.5), to: disp * 0.012 * (0.7 + rnd() * 0.6),
      spin: (rnd() - 0.5) * 1.2, peak: 0.34 * (0.8 + rnd() * 0.4),
      tint: rnd() < 0.5 ? C.cSmokeA : C.cSmokeB });
  }
  // 4) glowing purple embers — radial, high drag, shrink to nothing
  const nem = Math.round(14 * C.embers);
  for (let i = 0; i < nem; i++) {
    const a = rnd() * 6.28, sp = (240 + rnd() * 300) * C.spread;
    spawn({ tex: glowTex, blend: 'lighter',
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      drag: 0.82, life: C.emberLife * (0.7 + rnd() * 0.6),
      from: disp * 0.0045 * (0.6 + rnd() * 0.8), to: 0.001, spin: 0, peak: 1,
      tint: rnd() < 0.5 ? C.cEmberA : C.cEmberB });
  }
}

let last = performance.now();
function tick(now) {
  const dtMs = Math.min(50, now - last); last = now;
  const dt = dtMs / 1000;
  ctx.clearRect(0, 0, cv.width, cv.height);

  // pops: elastic scale-in + upward drift + hold jiggle, then burst
  for (let i = pops.length - 1; i >= 0; i--) {
    const sp = pops[i]; sp.age += dtMs;
    if (sp.age < C.popMs + C.holdMs) {
      const k = Math.min(1, sp.age / C.popMs);
      const e = k >= 1 ? 1 : Math.pow(2, -10 * k) * Math.sin((k - 0.075) * (2 * Math.PI / 0.32)) + 1;
      const jig = sp.age > C.popMs ? 1 + Math.sin((sp.age - C.popMs) / C.holdMs * Math.PI) * 0.03 : 1;
      const sc = sp.scale * (0.2 + 0.8 * e) * jig;
      const y = sp.y - Math.min(1, sp.age / C.popMs) * C.rise;
      // additive glow behind (sized off the art's long edge, so non-square silhouettes still bloom evenly)
      if (C.glowAlpha > 0) {
        const gw = Math.max(skullW, skullH) * sc * C.glowSize;
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = C.glowAlpha * Math.min(1, k * 1.5);
        drawTinted(glowTex, sp.x, y, gw, gw, 0, C.cGlow);
      }
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.drawImage(skullTex, sp.x - skullW * sc / 2, y - skullH * sc / 2, skullW * sc, skullH * sc);
    } else {
      burst({ ...sp, y: sp.y - C.rise });
      pops.splice(i, 1);
    }
  }

  // particles
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.age += dtMs;
    const t = p.age / p.life;
    if (t >= 1) { parts.splice(i, 1); continue; }
    const dk = Math.pow(p.drag, dt * 60); p.vx *= dk; p.vy *= dk;
    p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.spin * dt;
    const sc = p.from + (p.to - p.from) * t;
    ctx.globalCompositeOperation = p.blend;
    ctx.globalAlpha = Math.max(0, p.peak * (1 - t * t));
    const isSkull = p.tex === skullTex;
    const w = (isSkull ? skullW : glowTex.width) * sc;
    const h = (isSkull ? skullH : glowTex.height) * sc;
    if (p.tint) drawTinted(p.tex, p.x, p.y, w, h, p.rot, p.tint);
    else ctx.drawImage(p.tex, p.x - w / 2, p.y - h / 2, w, h);
  }
  ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
  diag.textContent = `canvas ${Math.round(cv.width)}×${Math.round(cv.height)} · pops ${pops.length} · parts ${parts.length} · skullTex ${skullW}px`;
  requestAnimationFrame(tick);
}

// tint a white sprite by multiplying — cheap stand-in for Pixi's sprite.tint
const tintCache = new Map();
function drawTinted(tex, x, y, w, h, rot, color) {
  const key = color;
  let t = tintCache.get(key);
  if (!t) {
    t = document.createElement('canvas'); t.width = tex.width; t.height = tex.height;
    const g = t.getContext('2d');
    g.drawImage(tex, 0, 0);
    g.globalCompositeOperation = 'source-in';
    g.fillStyle = color; g.fillRect(0, 0, t.width, t.height);
    tintCache.set(key, t);
  }
  if (rot) { ctx.save(); ctx.translate(x, y); ctx.rotate(rot); ctx.drawImage(t, -w/2, -h/2, w, h); ctx.restore(); }
  else ctx.drawImage(t, x - w / 2, y - h / 2, w, h);
}

// --- UI ---------------------------------------------------------------------
const controls = document.getElementById('controls'), out = document.getElementById('out');
function label(k) { return k.replace(/([A-Z])/g, ' $1').toLowerCase(); }
function build() {
  controls.innerHTML = '';
  for (const [title, keys] of GROUPS) {
    const h = document.createElement('h2'); h.textContent = title; controls.appendChild(h);
    for (const k of keys) {
      const row = document.createElement('div'); row.className = 'row';
      const l = document.createElement('label'); l.textContent = label(k);
      row.appendChild(l);
      if (k === 'shape') {
        const sel = document.createElement('select');
        sel.style.cssText = 'grid-column:1/-1;background:#241d31;color:#e8e2f2;border:1px solid #3d3350;border-radius:4px;padding:4px;font:inherit';
        for (const opt of ['svg', 'glyph']) { const o = document.createElement('option'); o.value = o.textContent = opt; sel.appendChild(o); }
        sel.value = C.shape;
        sel.onchange = () => { C.shape = sel.value; buildSkullTex(); build(); save(); checkGlyph(); };
        row.appendChild(sel);
      } else if (k === 'glyph') {
        const inp = document.createElement('input'); inp.type = 'text'; inp.value = C.glyph; inp.maxLength = 4;
        inp.disabled = C.shape !== 'glyph';
        inp.style.cssText = 'grid-column:1/-1;background:#241d31;color:#e8e2f2;border:1px solid #3d3350;border-radius:4px;padding:4px 8px;font:20px ' + FONT_STACK + ';text-align:center;opacity:' + (inp.disabled ? '0.4' : '1');
        inp.oninput = () => { C.glyph = inp.value || '☠'; buildSkullTex(); save(); checkGlyph(); };
        row.appendChild(inp);
      } else if (k.startsWith('c') && typeof C[k] === 'string') {
        const inp = document.createElement('input'); inp.type = 'color'; inp.value = C[k];
        inp.style.gridColumn = '1 / -1';
        inp.oninput = () => { C[k] = inp.value; tintCache.clear(); buildSkullTex(); save(); };
        row.appendChild(inp);
      } else {
        const [mn, mx, st] = RANGES[k];
        const inp = document.createElement('input'); inp.type = 'range';
        inp.min = mn; inp.max = mx; inp.step = st; inp.value = C[k];
        const v = document.createElement('span'); v.className = 'val'; v.textContent = C[k];
        inp.oninput = () => { C[k] = parseFloat(inp.value); v.textContent = C[k]; save(); };
        l.style.gridColumn = '1 / -1';
        row.style.gridTemplateColumns = '1fr 54px';
        row.appendChild(inp); row.appendChild(v);
      }
      controls.appendChild(row);
    }
  }
}
function save() { store.set(C); out.value = JSON.stringify(C, null, 2); }

const stage = document.getElementById('stage');
function centre() { const r = cv.getBoundingClientRect(); return [r.width / 2, r.height / 2 - 10]; }
document.getElementById('fire').onclick = () => fire(...centre());
stage.onclick = (e) => { const r = cv.getBoundingClientRect(); fire(e.clientX - r.left, e.clientY - r.top); };
addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); fire(...centre()); } });
let loopId = null;
document.getElementById('loop').onclick = (e) => {
  if (loopId) { clearInterval(loopId); loopId = null; e.target.textContent = 'Auto-loop: off'; }
  else { loopId = setInterval(() => fire(...centre()), 1600); e.target.textContent = 'Auto-loop: ON'; }
};
document.getElementById('reset').onclick = () => { C = { ...DEFAULTS }; tintCache.clear(); buildSkullTex(); build(); save(); checkGlyph(); };

// In glyph mode, does the system font actually have the character? (A miss renders as tofu — same width as
// U+FFFF.) In svg mode the silhouette is vendored, so there's nothing to check.
function checkGlyph() {
  const el = document.getElementById('glyphcheck');
  if (C.shape !== 'glyph') { el.textContent = 'shape: vendored SVG silhouette'; return; }
  const g = document.createElement('canvas').getContext('2d');
  g.font = `64px ${FONT_STACK}`;
  const a = g.measureText(C.glyph).width, b = g.measureText('￿').width;
  el.textContent = Math.abs(a - b) < 0.5
    ? `⚠ no “${C.glyph}” glyph in your fonts — you're seeing tofu`
    : `glyph “${C.glyph}” ok (${a.toFixed(0)}px @64)`;
}

buildSkullTex(); build(); save(); resize(); checkGlyph();
requestAnimationFrame((t) => { last = t; tick(t); });
setTimeout(() => fire(...centre()), 300);
</script>
</body>
</html>
