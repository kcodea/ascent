name: CI

# The gate that keeps `main` always-playable for two-dev work: every PR must typecheck, lint,
# build, and pass tests before it can merge. The build step is the closest proxy for "the game
# compiles + boots". See CLAUDE.md → Collaboration for the full flow.
on:
  pull_request:
    branches: [main]
  # Also run on direct pushes to main as a safety net (until branch protection is enabled).
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # The two halves of `npm run typecheck` (which is what CLAUDE.md tells a human to run), split into
      # separate steps so a red build names the layer that broke. Keep them in sync with package.json.
      - run: npm run typecheck:pkgs  # engine: core/content/sim/tools — the highest-value Claude-break catcher
      - run: npm run typecheck:web   # presentation: @game/ui + apps/web (vite build strips types, so this is the ONLY gate)
      - run: npm run lint        # eslint (incl. the Math.random ban in core/content/sim/tools)
      - run: npm test            # vitest: determinism + golden + effect tests
      - run: npm run build:web   # vite build MUST succeed = the game compiles
